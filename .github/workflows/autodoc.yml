name: AutoDoc Agent
on: [push]

# This is the "Key" that allows the bot to edit your README
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install groq python-dotenv

      - name: Run AutoDoc Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python app.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AutoDoc-Bot"
          # -f forces the add in case .gitignore is being stubborn
          git add -f README.md .code_hash || echo "No files to add"
          # Only commit if there are actual changes
          git commit -m "AI Update: Automated Documentation" || echo "Nothing to commit"
          git push origin main